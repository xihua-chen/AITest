<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Todo App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(135deg, #e0e7ff 0%, #f4f4f4 100%);
      display: flex;
      justify-content: center;
      padding: 40px 16px;
      min-height: 100vh;
    }

    /* ── Shared container ── */
    .container {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0,0,0,0.10);
      padding: 32px 28px 24px;
      width: 100%;
      max-width: 480px;
    }
    h1 { text-align: center; margin-bottom: 20px; color: #333; }
    .input-row {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
    }
    .input-row input {
      flex: 1;
      padding: 11px 14px;
      border: 1.5px solid #d0d5dd;
      border-radius: 8px;
      font-size: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .input-row input:focus { border-color: #4caf50; }
    .input-row button {
      padding: 11px 22px;
      background: #4caf50;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 16px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .input-row button:hover { background: #43a047; }

    /* Todo list */
    ul { list-style: none; }
    li {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 13px 12px;
      border-bottom: 1px solid #f0f0f0;
      transition: background 0.15s;
    }
    li:hover { background: #fafbfc; }
    li:last-child { border-bottom: none; }
    li .todo-text {
      word-break: break-word;
      flex: 1;
      cursor: pointer;
    }
    li .todo-text.done {
      text-decoration: line-through;
      color: #aaa;
    }
    li button {
      background: #e53935;
      color: #fff;
      border: none;
      border-radius: 6px;
      padding: 6px 14px;
      cursor: pointer;
      flex-shrink: 0;
      margin-left: 12px;
      font-size: 13px;
      transition: background 0.2s;
    }
    li button:hover { background: #c62828; }
    .empty { text-align: center; color: #bbb; padding: 20px; font-size: 15px; }
    .hidden { display: none; }
    .counter {
      text-align: right;
      font-size: 13px;
      color: #999;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Todo App</h1>
    <div class="input-row">
      <input type="text" id="todoInput" placeholder="Add a new todo…">
      <button id="addBtn">Add</button>
    </div>
    <ul id="todoList"></ul>
  </div>

  <script>
    const input = document.getElementById('todoInput');
    const addBtn = document.getElementById('addBtn');
    const list = document.getElementById('todoList');

    function addTodo() {
      const text = input.value.trim();
      if (!text) return;

      const li = document.createElement('li');

      const span = document.createElement('span');
      span.textContent = text;

      const deleteBtn = document.createElement('button');
      deleteBtn.textContent = 'Delete';
      deleteBtn.addEventListener('click', () => li.remove());

      li.appendChild(span);
      li.appendChild(deleteBtn);
      list.appendChild(li);

      input.value = '';
      input.focus();
      updateCounter();
    }

    document.getElementById('addBtn').addEventListener('click', addTodo);
    document.getElementById('todoInput').addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTodo();
    });
  </script>
</body>
</html>
